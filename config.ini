[modbus]
host    = 192.168.200.20
port    = 502
timeout = 4.0
# How often (seconds) to poll the OI Gateway
scan_interval = 8
# Comma-separated list of lines to scan
lines   = 1,2,3,4

[database]
host     = localhost
port     = 5432
name     = lynx
user     = lynx_user
password = secret
# How often (seconds) to write a snapshot to PostgreSQL
log_interval = 60
# Auto-purge: delete oldest rows when disk usage exceeds this % on the app mount point
purge_threshold = 80
# After purge, keep this % of the newest rows
purge_keep_pct  = 60
# Superuser used ONLY on first run to create the DB and user
# (postgres is the default superuser on most installs)
admin_user     = postgres
admin_password =

[flask]
secret_key = BriskHeat2025
# Port the web server listens on
port       = 5000

[dashboard]
# Used by lynx_set_all.py to reach the dashboard API
# Change to the PC's IP when running set_all from a remote machine
ip      = 127.0.0.1
timeout = 8
